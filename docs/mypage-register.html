<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>モビーマイページ登録</title>
  <meta name="description" content="複数のモビー診断結果をまとめて、Z世代向けにシェアできる自己紹介ページを生成">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #182433;
      --sub: #556274;
      --line: rgba(24, 36, 51, 0.15);
      --card: rgba(255, 255, 255, 0.86);
      --card-strong: rgba(255, 255, 255, 0.95);
      --accent: #0ea5e9;
      --accent-soft: rgba(14, 165, 233, 0.15);
      --ok: #22c55e;
      --warn: #f59e0b;
      --shadow: 0 26px 60px rgba(15, 35, 65, 0.16);
      --radius-lg: 26px;
      --radius-md: 16px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Zen Kaku Gothic New", sans-serif;
      background:
        radial-gradient(circle at 10% 16%, rgba(14, 165, 233, 0.22), transparent 44%),
        radial-gradient(circle at 88% 84%, rgba(251, 146, 60, 0.22), transparent 50%),
        linear-gradient(145deg, #f4fbff 0%, #fffaf4 52%, #f4fff9 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.52) 1px, transparent 1px);
      background-size: 20px 20px;
      opacity: 0.55;
    }

    .page {
      width: min(980px, 100% - 28px);
      margin: 28px auto 64px;
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .panel {
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 24px;
      overflow: hidden;
    }

    .hero {
      position: relative;
      isolation: isolate;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -110px;
      top: -100px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.32), rgba(14, 165, 233, 0));
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #0b4b6e;
      background: var(--accent-soft);
      border: 1px solid rgba(14, 165, 233, 0.3);
      border-radius: var(--radius-pill);
      padding: 6px 11px;
    }

    h1 {
      margin: 12px 0 0;
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1.04;
      letter-spacing: 0.01em;
    }

    .lead {
      margin: 10px 0 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.8;
      max-width: 760px;
    }

    .metrics {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      max-width: 520px;
    }

    .metric {
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--card-strong);
      padding: 11px 12px;
      text-align: left;
    }

    .metric strong {
      display: block;
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: 30px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--sub);
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .progress {
      margin-top: 14px;
      height: 10px;
      border-radius: var(--radius-pill);
      background: rgba(148, 163, 184, 0.25);
      overflow: hidden;
      max-width: 520px;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: var(--radius-pill);
      background: linear-gradient(90deg, #0ea5e9, #22c55e, #f59e0b);
      transition: width 0.35s ease;
    }

    .small-note {
      margin: 8px 0 0;
      font-size: 12px;
      color: #5f6f82;
    }

    h2 {
      margin: 0;
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.1;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .chip {
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card-strong);
      padding: 9px;
      min-height: 70px;
    }

    .chip-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cbd5e1;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.16);
      flex-shrink: 0;
    }

    .chip.is-done .dot {
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    }

    .chip-sub {
      margin-top: 6px;
      font-size: 11px;
      color: #617183;
      line-height: 1.45;
    }

    .form {
      margin-top: 14px;
      display: grid;
      gap: 10px;
      max-width: 620px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      font-size: 12px;
      color: #5d6c7f;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 12px 13px;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus {
      border-color: rgba(14, 165, 233, 0.55);
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.14);
    }

    .actions {
      margin-top: 4px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button,
    .btn {
      border: none;
      border-radius: var(--radius-pill);
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    button:hover,
    .btn:hover { transform: translateY(-1px); }
    button:active,
    .btn:active { transform: translateY(0); }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      box-shadow: 0 14px 30px rgba(2, 132, 199, 0.27);
    }

    .btn-ghost {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
    }

    .error {
      margin-top: 8px;
      color: #b91c1c;
      font-size: 12px;
      display: none;
    }

    .result {
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid rgba(34, 197, 94, 0.35);
      background: rgba(236, 253, 245, 0.9);
      padding: 12px;
      line-height: 1.8;
      font-size: 13px;
      display: none;
    }

    .result .actions {
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .chip-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .metrics {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel hero">
      <span class="eyebrow">Mobby Identity Hub</span>
      <h1>診断を束ねて、<br>“私”を一枚で見せる。</h1>
      <p class="lead">学校・メンヘラ・推し活・夜職・ママ診断を横断して、あなた専用のプロフィールページを作成します。SNSに貼るだけで「私こんなタイプ」が伝わる設計です。</p>
      <div class="metrics">
        <div class="metric"><strong id="doneCount">0</strong><span>完了診断</span></div>
        <div class="metric"><strong id="totalCount">5</strong><span>対象診断</span></div>
        <div class="metric"><strong id="rateText">0%</strong><span>収集率</span></div>
      </div>
      <div class="progress"><span id="progressBar"></span></div>
      <p class="small-note">診断済みデータは自動で反映されます。</p>
    </section>

    <section class="panel">
      <div class="card-top">
        <h2>マイページ登録</h2>
      </div>
      <p class="lead" style="margin-top:8px;">診断で使ったメールアドレスを入力すると、過去結果を集約してページを生成します。</p>

      <div class="chip-grid" id="diagnosisChips"></div>

      <div class="form">
        <div class="field">
          <label for="nameInput">表示名（任意）</label>
          <input id="nameInput" type="text" placeholder="例: はるか">
        </div>
        <div class="field">
          <label for="emailInput">メールアドレス（必須）</label>
          <input id="emailInput" type="email" placeholder="example@gmail.com">
        </div>
      </div>

      <div class="actions">
        <button id="createBtn" class="btn-primary" type="button">マイページを生成</button>
        <a class="btn btn-ghost" href="/index.html">トップに戻る</a>
      </div>

      <p id="errorText" class="error"></p>
      <div id="resultBox" class="result"></div>
    </section>
  </main>

  <script>
    (() => {
      const STORAGE_TARGETS = [
        { key: "school_char_diag_v1", label: "学校", source: "16school" },
        { key: "love_char_diag_v1", label: "メンヘラ", source: "16love" },
        { key: "stan_char_diag_v1", label: "推し活", source: "16stan" },
        { key: "night_char_diag_v1", label: "夜職", source: "16night" },
        { key: "mamaMobbyState", label: "ママ", source: "16mama" }
      ];

      const isLocal = location.hostname === "127.0.0.1" || location.hostname === "localhost";
      const apiBase = isLocal ? "https://www.mobby.online" : "";

      function parseStorage(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch (_) {
          return null;
        }
      }

      function readProgress() {
        const rows = [];
        let seedName = "";
        let seedEmail = "";
        STORAGE_TARGETS.forEach((target) => {
          const data = parseStorage(target.key);
          const answers = data && data.answers && typeof data.answers === "object" ? Object.keys(data.answers).length : 0;
          const name = data && data.profile ? data.profile.name || "" : "";
          const email = data && data.profile ? data.profile.email || "" : "";
          if (!seedName && name) seedName = name;
          if (!seedEmail && email) seedEmail = email;
          rows.push({
            label: target.label,
            source: target.source,
            answeredCount: answers,
            done: answers > 0,
            type: data && data.type ? data.type : "",
            diagnosisType: data && (data.diagnosisName || data.diagTitle) ? (data.diagnosisName || data.diagTitle) : "",
            axes: data && (data.axes || data.leftPct) ? (data.axes || data.leftPct) : {},
            createdAt: data && (data.createdAt || data.updatedAt) ? (data.createdAt || data.updatedAt) : ""
          });
        });
        return { rows, seedName, seedEmail };
      }

      const chipsEl = document.getElementById("diagnosisChips");
      const doneCountEl = document.getElementById("doneCount");
      const totalCountEl = document.getElementById("totalCount");
      const rateTextEl = document.getElementById("rateText");
      const progressBar = document.getElementById("progressBar");
      const nameInput = document.getElementById("nameInput");
      const emailInput = document.getElementById("emailInput");
      const createBtn = document.getElementById("createBtn");
      const errorText = document.getElementById("errorText");
      const resultBox = document.getElementById("resultBox");
      const progress = readProgress();

      const doneCount = progress.rows.filter((row) => row.done).length;
      const totalCount = progress.rows.length;
      const ratio = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;
      doneCountEl.textContent = String(doneCount);
      totalCountEl.textContent = String(totalCount);
      rateTextEl.textContent = ratio + "%";
      progressBar.style.width = ratio + "%";

      chipsEl.innerHTML = progress.rows.map((row) => {
        const klass = row.done ? "chip is-done" : "chip";
        const subtitle = row.done
          ? (row.diagnosisType || row.type || "診断済み")
          : "未診断";
        return (
          "<div class=\"" + klass + "\">" +
            "<div class=\"chip-head\"><span>" + row.label + "</span><span class=\"dot\"></span></div>" +
            "<div class=\"chip-sub\">" + subtitle + "</div>" +
          "</div>"
        );
      }).join("");

      if (progress.seedName) nameInput.value = progress.seedName;
      if (progress.seedEmail) emailInput.value = progress.seedEmail;

      function showError(message) {
        errorText.textContent = message;
        errorText.style.display = "block";
      }

      function clearError() {
        errorText.style.display = "none";
      }

      function showResult(viewerUrl) {
        resultBox.innerHTML =
          "生成が完了しました。<br>" +
          "<div class=\"actions\">" +
            "<a class=\"btn btn-primary\" href=\"" + viewerUrl + "\" target=\"_blank\" rel=\"noopener\">マイページを開く</a>" +
            "<button id=\"copyGeneratedLink\" class=\"btn btn-ghost\" type=\"button\">URLをコピー</button>" +
          "</div>";
        resultBox.style.display = "block";

        const copyBtn = document.getElementById("copyGeneratedLink");
        if (!copyBtn) return;
        copyBtn.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(viewerUrl);
            copyBtn.textContent = "コピーしました";
          } catch (_) {
            window.prompt("URLをコピーしてください", viewerUrl);
          }
        });
      }

      async function submit() {
        clearError();
        resultBox.style.display = "none";
        const name = String(nameInput.value || "").trim();
        const email = String(emailInput.value || "").trim();
        if (!email || !email.includes("@")) {
          showError("メールアドレスを入力してください。");
          return;
        }

        createBtn.disabled = true;
        createBtn.textContent = "生成中...";

        try {
          const response = await fetch(apiBase + "/api/mypage-register", {
            method: "POST",
            body: JSON.stringify({
              name,
              email,
              localDiagnostics: progress.rows.filter((row) => row.done)
            })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || !data || !data.ok) {
            throw new Error(data && data.error ? data.error : "ページ生成に失敗しました");
          }
          showResult(data.viewerUrl);
        } catch (error) {
          const rawMessage = error && error.message ? error.message : "";
          if (isLocal && /Failed to fetch|NetworkError|Load failed/i.test(rawMessage)) {
            showError("ローカル実行では通信がブロックされる場合があります。https://www.mobby.online/mypage-register.html で実行するか、`vercel dev` で同一オリジン起動してください。");
          } else {
            showError(rawMessage || "エラーが発生しました");
          }
        } finally {
          createBtn.disabled = false;
          createBtn.textContent = "マイページを生成";
        }
      }

      createBtn.addEventListener("click", submit);
      emailInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") submit();
      });
    })();
  </script>
</body>
</html>
