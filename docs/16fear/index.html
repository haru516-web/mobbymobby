    const state = { step: "intro", resumeStep: "intro", page: 0, answers: {}, questionOrder: [], tieOrder: [], tieAnswers: {} };

    function shuffleArray(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildQuestionOrder() {
      const buckets = {};
      MAIN_QUESTIONS.forEach((question, index) => {
        buckets[question.group] ??= [];
        buckets[question.group].push(index);
      });
      for (let attempt = 0; attempt < 300; attempt++) {
        const pool = {};
        Object.keys(buckets).forEach((key) => { pool[key] = shuffleArray(buckets[key]); });
        const order = [];
        let lastGroup = "";
        while (order.length < MAIN_QUESTIONS.length) {
          const usable = Object.keys(pool).filter((key) => pool[key].length > 0 && key !== lastGroup);
          if (!usable.length) break;
          const weighted = usable.flatMap((key) => Array(pool[key].length).fill(key));
          const group = weighted[Math.floor(Math.random() * weighted.length)];
          order.push(pool[group].pop());
          lastGroup = group;
        }
        if (order.length === MAIN_QUESTIONS.length) return order;
      }
      return shuffleArray([...Array(MAIN_QUESTIONS.length).keys()]);
    }

    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function setStep(step) { state.step = step; if (step !== "types") state.resumeStep = step; saveState(); }
    function resetAssessment() {
      state.page = 0;
      state.answers = {};
      state.tieAnswers = {};
      state.tieOrder = [];
      state.questionOrder = buildQuestionOrder();
      setStep("intro");
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) Object.assign(state, JSON.parse(raw));
      } catch (_) { }
      state.answers ||= {};
      state.tieAnswers ||= {};
      state.tieOrder ||= [];
      if (Object.values(state.answers).some((value) => typeof value !== "number")) state.answers = {};
      if (Object.values(state.tieAnswers).some((value) => typeof value !== "number")) state.tieAnswers = {};
      if (!Array.isArray(state.questionOrder) || state.questionOrder.length !== MAIN_QUESTIONS.length) state.questionOrder = buildQuestionOrder();
    }

    function normalizeAxisValue(question, value) {
      return question.side === "right" ? 8 - value : value;
    }

    function getAxisStats() {
      const stats = {};
      AXIS_ORDER.forEach((key) => {
        stats[key] = { sum: 0, count: 0, avg: 4, pct: 50, leftLeanCount: 0, rightLeanCount: 0, leftStrength: 0, rightStrength: 0 };
      });
      MAIN_QUESTIONS.forEach((question) => {
        const value = state.answers[question.id];
        if (typeof value !== "number") return;
        const normalized = normalizeAxisValue(question, value);
        const stat = stats[question.axis];
        stat.sum += normalized;
        stat.count += 1;
        if (normalized < 4) {
          stat.leftLeanCount += 1;
          stat.leftStrength += 4 - normalized;
        } else if (normalized > 4) {
          stat.rightLeanCount += 1;
          stat.rightStrength += normalized - 4;
        }
      });
      AXIS_ORDER.forEach((key) => {
        const stat = stats[key];
        stat.avg = stat.count ? stat.sum / stat.count : 4;
        stat.pct = (stat.avg - 1) / 6 * 100;
      });
      return stats;
    }

    function getTieAxes(stats = getAxisStats()) {
      return AXIS_ORDER.filter((key) => Math.abs(stats[key].avg - 4) < 1e-9);
    }

    function resolveAxis(key, stat, tieValue) {
      const axis = AXES[key];
      if (stat.avg < 4) return { value: axis.leftKey, side: "left", source: "main" };
      if (stat.avg > 4) return { value: axis.rightKey, side: "right", source: "main" };
      if (typeof tieValue !== "number") return null;
      if (tieValue < 4) return { value: axis.leftKey, side: "left", source: "tie" };
      if (tieValue > 4) return { value: axis.rightKey, side: "right", source: "tie" };
      if (stat.leftStrength > stat.rightStrength) return { value: axis.leftKey, side: "left", source: "tie_fallback" };
      if (stat.rightStrength > stat.leftStrength) return { value: axis.rightKey, side: "right", source: "tie_fallback" };
      if (stat.leftLeanCount > stat.rightLeanCount) return { value: axis.leftKey, side: "left", source: "tie_fallback" };
      if (stat.rightLeanCount > stat.leftLeanCount) return { value: axis.rightKey, side: "right", source: "tie_fallback" };
      return { value: axis.leftKey, side: "left", source: "tie_fallback" };
    }

    function getSummary() {
      const stats = getAxisStats();
      const resolved = {};
      const decisions = {};
      const unresolved = [];
      AXIS_ORDER.forEach((key) => {
        const decision = resolveAxis(key, stats[key], state.tieAnswers[key]);
        if (!decision) {
          unresolved.push(key);
          return;
        }
        resolved[key] = decision.value;
        decisions[key] = decision;
      });
      const code = unresolved.length ? null : [resolved.origin, resolved.pain, resolved.time, resolved.guard].join("|");
      return { stats, resolved, decisions, unresolved, code, result: code ? RESULTS[code] : null };
    }

      const mobile = /Android/i.test(navigator.userAgent || "") || /iPhone|iPad|iPod/i.test(navigator.userAgent || "");
      return { href: mobile ? appUrl : webUrl, target: mobile ? "_self" : "_blank" };

          <p class="helper" style="margin-top:14px;">質問順はシャッフルしています。同じ系統が続きにくい順番です。</p>
        </section>
      `;
      document.querySelectorAll("[data-q][data-v]").forEach((button) => {
        button.addEventListener("click", () => {
          state.answers[button.dataset.q] = Number(button.dataset.v);
          saveState();
          renderQuiz();
        });
      });
      if (document.getElementById("prevBtn")) document.getElementById("prevBtn").onclick = () => { state.page -= 1; saveState(); render(); };
      if (document.getElementById("nextBtn")) document.getElementById("nextBtn").onclick = () => { state.page += 1; saveState(); render(); };
      if (document.getElementById("finishBtn")) document.getElementById("finishBtn").onclick = () => {
        state.tieAnswers = {};
        state.tieOrder = getTieAxes();
        setStep(state.tieOrder.length ? "tie" : "result");
        render();
      };
    }

    function renderTie() {
      if (!state.tieOrder.length) { setStep("result"); render(); return; }
      const allAnswered = state.tieOrder.every((key) => typeof state.tieAnswers[key] === "number");
      document.getElementById("app").innerHTML = `
        <section class="panel">
          <p class="kicker">Tie Break</p>
          <h2 class="big" style="font-size:32px;">同点だった軸だけ、もう少しだけ。</h2>
          <p class="text">7段階で同点になった軸だけ補助質問を出しています。ここで最終タイプが確定します。</p>
          <div class="stack" style="margin-top:16px;">
            ${state.tieOrder.map((key, index) => `
              <article class="qcard">
                <p class="qindex">Tie ${String(index + 1).padStart(2, "0")} / ${state.tieOrder.length}</p>
                <p class="helper" style="margin-bottom:8px;">${AXES[key].label} を決めます</p>
                <p class="qtext">${AXES[key].tieQuestion}</p>
                <div class="likert7">
                  <div class="likert-labels"><span class="left">そう思う</span><span class="right">そう思わない</span></div>
                  <div class="likert-buttons">
                    ${[1, 2, 3, 4, 5, 6, 7].map((value) => {
                      const posClass = value < 4 ? "left" : value === 4 ? "mid" : "right";
                      const selected = state.tieAnswers[key] === value ? " selected" : "";
                      return `<button class="likert-btn ${posClass}${selected}" data-tie="${key}" data-v="${value}" data-i="${value}"></button>`;
                    }).join("")}
                  </div>
                </div>
                <p class="helper" style="margin-top:12px;">左寄りなら ${AXES[key].leftLabel}、右寄りなら ${AXES[key].rightLabel} を採用します。</p>
              </article>
            `).join("")}
          </div>
          <div class="footer-row">
            <button class="btn btn-secondary" id="backQuizBtn">質問に戻る</button>
            <button class="btn btn-primary" id="resultBtn" ${allAnswered ? "" : "disabled"}>結果を見る</button>
          </div>
        </section>
      `;
      document.querySelectorAll("[data-tie][data-v]").forEach((button) => {
        button.addEventListener("click", () => {
          state.tieAnswers[button.dataset.tie] = Number(button.dataset.v);
          saveState();
          renderTie();
        });
      });
      document.getElementById("backQuizBtn").onclick = () => { state.page = Math.ceil(MAIN_QUESTIONS.length / PAGE_SIZE) - 1; state.tieAnswers = {}; state.tieOrder = []; setStep("quiz"); render(); };
      document.getElementById("resultBtn").onclick = () => { setStep("result"); render(); };
    }

    function renderResult() {
      const summary = getSummary();
      if (!summary.result) {
        if (summary.unresolved.length) { state.tieOrder = summary.unresolved; setStep("tie"); render(); return; }
        setStep("intro"); render(); return;
      }
      const result = summary.result;
      const tags = tagsFromCode(summary.code);
      const shareText = `恐怖モビー診断の結果は「${result.name}」でした。\n${result.brief}`;
      const shareUrl = "https://www.mobby.online/16fear";
      const line = lineShareUrl(`恐怖モビー診断の結果は「${result.name}」でした。`, shareUrl);
      document.getElementById("app").innerHTML = `
        <section class="panel">
          <p class="kicker">Your Fear Mobby</p>
          <div class="type-no">#${result.number}</div>
          <h2 class="big" style="margin-top:16px;">${result.name}</h2>
          <p class="text" style="color:var(--text-main);">${result.brief}</p>
          <div class="tags" style="margin-top:16px;">${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
        </section>

        <section class="panel">
          <p class="kicker">Result Story</p>
          <div class="story-grid">${storyMarkup(result)}</div>
        </section>

        <section class="panel">
          <p class="kicker">4 Axes</p>
          <div class="axis-grid">
            ${AXIS_ORDER.map((key) => `
              <div class="axis">
                <div class="axis-head">
                  <h3 class="axis-name">${AXES[key].label}</h3>
                  <span class="axis-note">${summary.decisions[key].source === "main" ? "メイン質問で決定" : "補助質問で決定"}</span>
                </div>
                <div class="axis-labels"><span>${AXES[key].leftLabel}</span><span>${AXES[key].rightLabel}</span></div>
                <div class="axis-track"><div class="axis-center"></div><div class="axis-dot" style="left:${summary.stats[key].pct}%"></div></div>
                <div class="axis-meta"><span>${Math.round(100 - summary.stats[key].pct)}%</span><span>${Math.round(summary.stats[key].pct)}%</span></div>
              </div>
            `).join("")}
          </div>
        </section>

        <section class="panel">
          <p class="kicker">Share</p>
          <p class="text">画像はあとで入れられるよう、今はテキスト共有だけ入れています。</p>
          <div class="share" style="margin-top:16px;">
            <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}" target="_blank" rel="noopener">Xでシェア</a>
            <a href="${line.href}" target="${line.target}" rel="noopener">LINEでシェア</a>
            <button id="copyBtn">結果をコピー</button>
          </div>
          <p class="helper" id="copyMsg" style="margin-top:12px;"></p>
        </section>

        <div class="actions">
          <button class="btn btn-primary" id="retakeBtn">もう一度診断する</button>
          <button class="btn btn-secondary" id="resultTypesBtn">全16タイプを見る</button>
        </div>
      `;
      document.getElementById("retakeBtn").onclick = () => { resetAssessment(); render(); };
      document.getElementById("resultTypesBtn").onclick = () => { state.step = "types"; saveState(); render(); };
      document.getElementById("copyBtn").onclick = async () => {
        const msg = document.getElementById("copyMsg");
        try {
          await navigator.clipboard.writeText(`${shareText}\n${shareUrl}`);
          msg.textContent = "共有テキストをコピーしました。";
        } catch (_) {
          msg.textContent = "コピーに失敗しました。";
        }
      };
    }

    function renderTypes() {
      const entries = Object.entries(RESULTS).sort((a, b) => Number(a[1].number) - Number(b[1].number));
      document.getElementById("app").innerHTML = `
        <section class="panel">
          <p class="kicker">All Types</p>
          <h2 class="big" style="font-size:36px;">恐怖モビー 16タイプ一覧</h2>
          <p class="text">4軸の組み合わせで、守り方のクセが16タイプに分かれます。詳細は各カードを開いて見られます。</p>
        </section>

        <section class="panel">
          <div class="legend-grid">
            <div class="legend"><h3>他人起点 / 自分起点</h3><p>不安が相手の反応に寄りやすいか、自分の出来や見え方に寄りやすいか。</p></div>
            <div class="legend"><h3>拒絶 / 無力</h3><p>嫌われる痛みが強いか、飲まれる・動かせない痛みが強いか。</p></div>
            <div class="legend"><h3>今 / 先</h3><p>不安がその場に出やすいか、未来の変化や後悔に向きやすいか。</p></div>
            <div class="legend"><h3>回避 / 制御</h3><p>距離を取って守るか、確認や段取りで整えて守るか。</p></div>
          </div>
        </section>

        <section class="types">
          ${entries.map(([code, result]) => `
            <details class="type-item">
              <summary>
                <div class="type-head">
                  <div>
                    <div class="type-no" style="width:56px;height:56px;border-radius:18px;font-size:20px;">#${result.number}</div>
                    <h3 style="margin-top:12px;">${result.name}</h3>
                  </div>
                  <div class="tags">${tagsFromCode(code).map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
                </div>
                <p>${result.brief}</p>
              </summary>
              <div class="story-grid" style="margin-top:14px;">${storyMarkup(result)}</div>
            </details>
          `).join("")}
        </section>
      `;
    }

    function render() {
      updateNav();
      window.scrollTo(0, 0);
      if (state.step === "intro") renderIntro();
      else if (state.step === "quiz") renderQuiz();
      else if (state.step === "tie") renderTie();
      else if (state.step === "types") renderTypes();
      else renderResult();
    }

    document.getElementById("brandHome").addEventListener("click", () => { window.location.href = "../"; });
    document.getElementById("brandHome").addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") { event.preventDefault(); window.location.href = "../"; }
    });
    document.getElementById("navDiagnosis").addEventListener("click", (event) => { event.preventDefault(); setStep(state.resumeStep || "intro"); render(); });
    document.getElementById("navTypes").addEventListener("click", (event) => { event.preventDefault(); state.step = "types"; saveState(); render(); });

    loadState();
    render();
  </script>
</body>

</html>
