  <text x="76" y="248" fill="#3F2231" font-family="Yu Gothic, Yu Gothic UI, sans-serif" font-size="100" font-weight="700">今日の本音、</text>
  <text x="76" y="362" fill="#3F2231" font-family="Yu Gothic, Yu Gothic UI, sans-serif" font-size="100" font-weight="700">ガチャで出る。</text>

