  <text x="82" y="492" fill="#6E5362" font-family="Yu Gothic, Yu Gothic UI, sans-serif" font-size="35" font-weight="700">96キャラ / 288カードを、毎日1回無料で引ける。</text>
  <text x="82" y="540" fill="#6E5362" font-family="Yu Gothic, Yu Gothic UI, sans-serif" font-size="35" font-weight="700">結果もコレクション画像も、そのままSNSへ。</text>

