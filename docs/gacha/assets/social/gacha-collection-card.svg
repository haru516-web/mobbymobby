  <text x="78" y="350" fill="#3F2231" font-family="Yu Gothic, Yu Gothic UI, sans-serif" font-size="92" font-weight="700">投稿までがセット。</text>

  <text x="82" y="430" fill="#6E5362" font-family="Yu Gothic, Yu Gothic UI, sans-serif" font-size="34" font-weight="700">コレクション画像を保存して、そのままSNSに出せる。</text>
  <text x="82" y="476" fill="#6E5362" font-family="Yu Gothic, Yu Gothic UI, sans-serif" font-size="34" font-weight="700">引いて終わりじゃなく、増えるほど見せ方が強くなる。</text>

  <g transform="translate(80 566)">
