            "もはかや": { name: "미인다실 모비", summary: "화려하게 분위기를 돌려서 전원을 웃게 한다.", catch: "「전원 즐기고 있어? 그게 가장 중요해!」분위기를 최고로 만드는 게 사명.", hook: "프리 손님이 와도 무섭지 않다. 누구와도 대화할 수 있고, 분위기가 달아오르면 새로운 손님도 자연히 늘어난다. 수입보다 「오늘도 즐거웠다」가 원동력.", downside: "즐거움 우선으로 자기 한계를 눈치채기 어렵다. 컨디션 관리가 과제.", perception: "「무드 메이커」「없으면 시작 안 된다」고 평가받기 쉽다.", strength: "커뮤니케이션 능력이 높고, 어떤 고객층에도 대응할 수 있다.", weakness: "자기 한계를 넘어 너무 열심히 한다.", love: "연애는 흥과 기세. 즐거운 분위기 속에서 시작되기 쉽다.", bestJob: "걸스바", drinkStyle: "모두의 잔을 보고 「리필 할래?」가 자연스럽게 나온다. 술자리의 진행 역할. 테이블 전체의 분위기를 술로 띄울 수 있다.", altCheck: "→ 조금 더 차분하고 싶다면 「모두의 태양 모비」일지도." },
            "もなふし": { name: "FABRIC 모비", summary: "품격 있는 접객으로 단골을 잡고 착실히 번다.", catch: "「품격과 신뢰로 승부한다」차분한 접객력으로 에이스에 오르는 타입.", hook: "화려하게 띄우는 타입은 아니지만, 어느새 지명이 가장 많다. 손님의 이야기를 제대로 듣고 편안한 공간을 만든다. 「여기 오면 편안해」라고 들리면 기쁘다.", downside: "수수하게 보이기 쉽다. 화려함으로 승부하는 아이에게 초조할 때도.", perception: "「안정적이다」「신뢰할 수 있다」고 생각되기 쉽다.", strength: "리피트율이 높다. 단골과의 관계를 장기적으로 유지할 수 있다.", weakness: "화려함이 부족하면 자기 평가가 내려가기 쉽다.", love: "연애는 성실하고 오래간다. 신뢰관계를 소중히 한다.", bestJob: "라운지", drinkStyle: "손님의 페이스에 맞춰 물타기나 온더락을 천천히. 술 지식이 풍부하고 자연스럽게 좋은 보틀을 제안할 수 있다.", altCheck: "→ 더 즐거움 우선이라면 「azian 모비」일지도." },

            "きはふや": { name: "Lalah 모비", summary: "귀여움받는 힘으로 단골에게 사랑받는다.", catch: "「아~ 응석부려도 돼~♡」애교와 응석으로 단골의 하트를 잡는다.", hook: "「귀엽다」고 들으면 최강이 될 수 있다. 단골에게는 응석이 일. 보틀 받으면 전력으로 기뻐한다. 이 순수함이 무기라는 걸 알고 있다.", downside: "나이와 함께 캐릭터 유지가 힘들어진다. 응석 피로할 때도.", perception: "「귀엽다」「지켜주고 싶다」고 평가받기 쉽다.", strength: "단골에게 사랑받기 쉽다. 리피트율이 높다.", weakness: "자립적인 접객이 요구되는 장면에서 약하다.", love: "연애도 응석 잘한다. 하지만 의존 과도에 주의.", bestJob: "캬바쿠라", drinkStyle: "「에~ 이거 마셔보고 싶어♡」로 조르기 특기. 달콤한 칵테일이 좋고, 손님에게 만들어달라고 하는 것도 특기.", altCheck: "→ 더 쿨하게 가고 싶다면 「단골 육성 모비」일지도." },

            "きはかや": { name: "SNS 전략가 모비", summary: "SNS로 세계관을 만들고 팬을 모은다.", catch: "「팔로워＝잠재 고객」디지털로 차별화하는 신시대 캐스트.", hook: "틱톡도 인스타도 유튜브도 전부 하고 있다. 하지만 전부 계산. 세계관을 통일해서 방문 전부터 팬으로 만든다. 가게에 왔을 때는 이미 「최애」가 되어 있다.", downside: "SNS 운영에 시간을 너무 빼앗긴다. 실제 접객과의 양립이 과제.", perception: "「대단하다」「시대에 맞다」고 평가받기 쉽다.", strength: "온라인 집객력이 높다. 팬 베이스를 구축할 수 있다.", weakness: "오프라인 접객력이 성장하기 어려울 때도.", love: "연애도 발신력 높다. 하지만 진짜 자기를 보여주는 게 서투르다.", bestJob: "걸스바", drinkStyle: "인생샷 칵테일이나 오리지널 드링크를 SNS로 공유. 마시는 방법조차 콘텐츠로 만드는 신시대 스타일.", altCheck: "→ 오프라인으로 승부하고 싶다면 「AOI 모비」일지도." },
