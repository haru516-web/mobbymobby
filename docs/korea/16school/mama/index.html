  <style>
    :root {
      --font-ja: 'Yomogi', cursive;
      --font-en: 'Yomogi', cursive;
      --bg: #fff0f5;
      --surface: #ffffff;
      --text-main: #1d1d1f;
      --text-sub: #86868b;
      --accent: #ec407a;
      --accent-soft: #fce4ec;
      --line: #f8bbd9;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 30px rgba(0,0,0,0.08);

      --radius-sm: 12px;
      --danger: #ff3b30;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body {
      margin: 0;
      font-family: var(--font-en), var(--font-ja);
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 0px; }
    .logo {
      width: 30px; height: 30px; border-radius: 10px;
      background-image: url('../logo.jpg');
      background-size: cover;
      background-position: center;
      box-shadow: 0 4px 10px rgba(236,64,122,0.3);
      cursor: pointer;
      margin-right: 10px;
    }
    .title h1 { font-size: 14px; margin: 0; font-weight: 600; cursor: pointer; }
    .title p { margin: 0; color: var(--text-sub); font-size: 12px; }
    .nav {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .nav a {
      color: var(--text-main);
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .nav a:hover {
      background: rgba(0,0,0,0.05);
    }
    .nav a.active {
      background: var(--accent-soft);
      color: var(--accent);
    }
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .nav { width: auto; justify-content: flex-start; }
    }

    button {
      border: 1px solid transparent;
      background: rgba(0,0,0,0.05);
      color: var(--text-main);
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover { background: rgba(0,0,0,0.08); transform: translateY(-1px); }
    button:active { transform: translateY(0) scale(0.96); }
    
    button.primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px rgba(236,64,122,0.25);
    }
    button.primary:hover { background: #d81b60; box-shadow: 0 6px 16px rgba(236,64,122,0.35); }
    button.primary:active { box-shadow: 0 2px 8px rgba(236,64,122,0.3); transform: translateY(1px) scale(0.97); }
    
    button.danger { color: var(--danger); background: rgba(255,59,48,0.05); }
    button.danger:hover { background: rgba(255,59,48,0.1); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .panel {
      background: var(--surface);
      border-radius: var(--radius);

    .text-body {

    .likert7{

      gap: 8px;

    }
    .likert-labels{

      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      font-weight: 700;
      padding: 0 4px;
    }
    .likert-labels .left{ color:#2f9e73; }
    .likert-labels .right{ color:#7b5aa6; }
    .likert-buttons{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex-wrap: nowrap;
      width: 100%;
    }

    .likert-btn{
      appearance:none;
      -webkit-appearance:none;
      border: 3px solid rgba(0,0,0,0.25);
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      padding: 0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition: transform 0.16s cubic-bezier(0.34, 1.56, 0.64, 1), background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      flex-shrink: 0;
    }
    .likert-btn[data-i="1"], .likert-btn[data-i="7"] { width: 76px; height: 76px; }
    .likert-btn[data-i="2"], .likert-btn[data-i="6"] { width: 58px; height: 58px; }
    .likert-btn[data-i="3"], .likert-btn[data-i="5"] { width: 44px; height: 44px; }
    .likert-btn[data-i="4"] { width: 30px; height: 30px; }

    .likert-btn.left  { border-color: rgba(47,158,115,0.85); }
    .likert-btn.mid   { border-color: rgba(140,140,148,0.65); }
    .likert-btn.right { border-color: rgba(123,90,166,0.85); }

    .likert-btn.selected{
      background: rgba(236,64,122,0.28);
      box-shadow: 0 0 0 6px rgba(236,64,122,0.12);
      border-color: rgba(236,64,122,0.65);
    }
    .likert-btn:active{ transform: scale(0.92); }

    @media (max-width: 420px){
      .likert7{ gap: 6px; }
      .likert-labels{ font-size: 9px; padding: 0 2px; }
      .likert-buttons{ gap: 4px; }
      .likert-btn[data-i="1"], .likert-btn[data-i="7"] { width: 48px; height: 48px; }
      .likert-btn[data-i="2"], .likert-btn[data-i="6"] { width: 40px; height: 40px; }
      .likert-btn[data-i="3"], .likert-btn[data-i="5"] { width: 32px; height: 32px; }
      .likert-btn[data-i="4"] { width: 24px; height: 24px; }
    }
    @media (max-width: 360px){
      .likert7{ gap: 4px; }
      .likert-labels{ font-size: 8px; }
      .likert-buttons{ gap: 2px; }
      .likert-btn[data-i="1"], .likert-btn[data-i="7"] { width: 42px; height: 42px; }
      .likert-btn[data-i="2"], .likert-btn[data-i="6"] { width: 36px; height: 36px; }
      .likert-btn[data-i="3"], .likert-btn[data-i="5"] { width: 28px; height: 28px; }
      .likert-btn[data-i="4"] { width: 22px; height: 22px; }
    }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }
    @media (max-width: 600px) {
      .char-grid { 
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }
    .char-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.8);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    @media (max-width: 600px) {
      .char-card {
        padding: 8px;
        border-radius: 12px;
      }
    }
    .char-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .char-card-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      background: #f0f0f5;
    }
    @media (max-width: 600px) {
      .char-card-image {
        border-radius: 8px;
        margin-bottom: 6px;
      }
    }
    .char-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .char-card-name {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--text-main);
    }
    @media (max-width: 600px) {
      .char-card-name {
        font-size: 11px;
        margin-bottom: 4px;
      }
    }
    .char-card-code {
      font-size: 11px;
      font-family: monospace;
      color: var(--text-sub);
      background: #f0f0f5;
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      display: inline-block;
    }
    @media (max-width: 600px) {
      .char-card-code {
        font-size: 9px;
        padding: 1px 4px;
        margin-bottom: 4px;
      }
    }
    .char-card-desc {
      font-size: 13px;
      color: var(--text-sub);
      flex: 1;
      margin-bottom: 12px;
    }
    @media (max-width: 600px) {
      .char-card-desc {
        display: none;
      }
    }
    .char-card-detail-btn {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      margin-top: auto;
    }
    @media (max-width: 600px) {
      .char-card-detail-btn {
        padding: 6px;
        font-size: 10px;
      }
    }

    .char-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    .char-modal {
      background: var(--surface);
      border-radius: 24px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalSlideIn 0.3s ease;
      transform: scale(0.95);
    }
    @keyframes modalSlideIn {
      to { transform: scale(1); }
    }
    .char-modal-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 32px; height: 32px;
      border: none;
      background: rgba(0,0,0,0.05);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-main);
      transition: background 0.2s;
    }
    .char-modal-close:hover { background: rgba(0,0,0,0.1); }
    .char-modal-image {
      width: 200px; height: 200px;
      border-radius: 16px;
      overflow: hidden;
      margin: 0 auto 24px;
      background: #f0f0f5;
    }
    .char-modal-image img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .char-modal-type {
      display: inline-block;
      background: #f0f0f5;
      padding: 6px 16px;
      border-radius: 12px;
      font-size: 12px;
      font-family: monospace;
      color: var(--text-sub);
      margin-bottom: 16px;
    }
    .char-modal-name {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 16px;
      color: var(--text-main);
      text-align: center;
    }
    .char-modal-desc {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-main);
      margin: 0;
    }

    .result-hero {
      text-align: center;
      margin-bottom: 40px;
    }
    .char-image-placeholder {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1 / 1;
      background: #f0f0f5;
      border-radius: 24px;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-sub);
      font-size: 13px;
      border: 1px dashed #d2d2d7;
      overflow: hidden;
    }
    .char-image-placeholder img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }
    @media (max-width: 700px) { .card-grid { grid-template-columns: 1fr; } }

    .info-card {
      background: #f5f5f7;
      padding: 20px;
      border-radius: 16px;
    }
    .info-card h3 { margin: 0 0 12px; font-size: 15px; color: var(--text-main); }
    .info-card ul { margin: 0; padding-left: 20px; font-size: 13px; color: var(--text-main); }
    .info-card li { margin-bottom: 6px; }
    .info-card .tip-title { display: block; font-weight: 600; margin-bottom: 4px; }
    .info-card .tip-body { display: block; color: var(--text-main); }

    .result-product-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 5px;
      border-radius: 14px;
      background: rgba(255, 182, 205, 0.2);
      border: 1px solid rgba(255, 77, 141, 0.18);
      margin-bottom: 16px;
    }
    .result-product-tab {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 700;
      color: #96506b;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .result-product-tab[aria-selected="true"] {
      background: #ffffff;
      color: #b65174;
      border-color: rgba(255, 77, 141, 0.3);
      box-shadow: 0 8px 16px rgba(255, 77, 141, 0.12);
    }
    .result-product-tab[aria-selected="false"] {
      opacity: 0.78;
    }
    .result-product-tab:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 77, 141, 0.2);
    }
    .result-product-content {
      display: none;
    }
    .result-product-content.is-active {
      display: block;
    }
    .plush-gallery{
      margin-bottom:14px;
    }
    .plush-gallery-swipe-hint{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-bottom:8px;
      font-size:11px;
      font-weight:700;
      color:#b65174;
      letter-spacing:0.01em;
      transition:opacity 0.2s ease;
    }
    .plush-gallery-swipe-hint.is-hidden{
      opacity:0;
    }
    .plush-gallery-swipe-icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      animation:plushSwipeHint 1.3s ease-in-out infinite;
    }
    @keyframes plushSwipeHint{
      0%,100%{transform:translateX(-4px);}
      50%{transform:translateX(4px);}
    }
    .plush-gallery-viewport{
      position:relative;
      overflow:hidden;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.9);
      background:linear-gradient(145deg, #ffe9f4, #fff7ec);
      touch-action:pan-y;
      cursor:grab;
    }
    .plush-gallery-viewport.is-dragging{
      cursor:grabbing;
    }
    .plush-gallery-viewport::before,
    .plush-gallery-viewport::after{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      width:24px;
      pointer-events:none;
      z-index:2;
    }
    .plush-gallery-viewport::before{
      left:0;
      background:linear-gradient(to right, rgba(255,247,251,0.8), rgba(255,247,251,0));
    }
    .plush-gallery-viewport::after{
      right:0;
      background:linear-gradient(to left, rgba(255,247,251,0.8), rgba(255,247,251,0));
    }
    .plush-gallery-track{
      display:flex;
      transition:transform 0.36s ease;
      will-change:transform;
    }
    .plush-gallery-slide{
      min-width:100%;
      display:flex;
      justify-content:center;
      padding:10px;
    }
    .plush-gallery-slide img{
      width:auto;
      max-width:min(100%, 240px);
      max-height:188px;
      height:auto;
      display:block;
      border-radius:14px;
      object-fit:cover;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
      border:1px solid rgba(255,255,255,0.92);
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }
    .plush-gallery-controls{
      margin-top:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .plush-gallery-nav{
      width:30px;
      height:30px;
      border-radius:999px;
      border:1px solid rgba(255,77,141,0.35);
      background:rgba(255,255,255,0.85);
      color:#b65174;
      font-size:16px;
      font-weight:700;
      line-height:1;
      cursor:pointer;
      transition:transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }
    .plush-gallery-nav:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,0.98);
    }
    .plush-gallery-nav:disabled{
      opacity:0.45;
      cursor:default;
      transform:none;
    }
    .plush-gallery-dots{
      display:flex;
      gap:7px;
      align-items:center;
      justify-content:center;
    }
    .plush-gallery-dot{
      width:7px;
      height:7px;
      border-radius:50%;
      border:none;

      return { step:"intro", page:0, answers:{}, questionOrder:null, profile:{ name:"", email:"" } };

    function loadState(){
      try {
        const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if(s && s.answers){
          if(!s.profile) s.profile = { name:"", email:"" };
          s.profile.name = s.profile.name || "";
          s.profile.email = s.profile.email || "";
          return s;
        }
      } catch(e){}
      return createDefaultState();
    }
    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function isRegistered(){
      // ローカル環境（localhost または 127.0.0.1）の場合は自動的にスキップ
      const hostname = window.location.hostname;

      const isLocal = hostname === 'localhost' ||

      console.log('[DEBUG] isRegistered check:', { hostname, protocol, isLocal });

    // Question order (shuffle once per session)
    function getQuestionOrder(){
      if(!state.questionOrder){
        const byAxis = {A:[],B:[],C:[],D:[]};
        QUESTIONS.forEach((q,i) => byAxis[q.axis].push(i));
        Object.values(byAxis).forEach(arr => shuffleArray(arr));
        const order = [];
        for(let i=0; i<10; i++){
          ["A","B","C","D"].forEach(ax => {
            if(byAxis[ax][i] !== undefined) order.push(byAxis[ax][i]);
          });
        }
        state.questionOrder = order;
        saveState();
      }
      return state.questionOrder;
    }
    function shuffleArray(arr){
      for(let i=arr.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }
    function getShuffledQuestions(){
      const order = getQuestionOrder();
      return order.map(i => QUESTIONS[i]);
    }

    // Compute result
    function computeResult(){
      const axes = AXES;
      const byAxis = {A:[],B:[],C:[],D:[]};
      QUESTIONS.forEach(q => {
        const raw = state.answers[q.id];
        if(raw !== undefined){
          const score = q.reverse ? (8 - raw) : raw;
          byAxis[q.axis].push({ id:q.id, text:q.text, raw, score, reverse:q.reverse });
        }
      });

      const means = {};
      const breakdown = {};
      for(const k of ["A","B","C","D"]){
        const arr = byAxis[k];
        if(arr.length === 0){ means[k] = 4; breakdown[k] = []; continue; }
        const sum = arr.reduce((a,b) => a + b.score, 0);
        means[k] = sum / arr.length;
        breakdown[k] = arr.map(it => {
          const contrib = (it.score - 4) / 3;
          return { id:it.id, text:it.text, ans:it.raw, contrib };
        });
      }

      const hard = {};
      const norm = {};
      const pos = {};
      const leftPct = {};
      const confidenceLevel = {};
      const confidenceLabel = {};
      const coherenceByAxis = {};
      let midCount = 0;

      for(const k of ["A","B","C","D"]){
        const m = means[k];
        const n = (m - 1) / 6;
        norm[k] = n;
        pos[k] = Math.round(n * 100);
        leftPct[k] = Math.round((1 - n) * 100);
        hard[k] = n < 0.5 ? "L" : "R";

        const dist = Math.abs(n - 0.5);
        if(dist < 0.1){
          confidenceLevel[k] = "mid";
          confidenceLabel[k] = "상황에 따라";
          midCount++;
        } else if(dist < 0.2){
          confidenceLevel[k] = "moderate";
          confidenceLabel[k] = "약간";
        } else {
          confidenceLevel[k] = "strong";
          confidenceLabel[k] = "확실히";
        }

        const arr = byAxis[k];
        if(arr.length > 1){
          const avg = means[k];
          const variance = arr.reduce((s, it) => s + Math.pow(it.score - avg, 2), 0) / arr.length;
          coherenceByAxis[k] = 1 - Math.sqrt(variance) / 3;
        } else {
          coherenceByAxis[k] = 1;
        }
      }

      const codeArr = ["A","B","C","D"].map(k => hard[k] === "L" ? axes[k].leftCode : axes[k].rightCode);
      const actualCode = codeArr.join("");

      // Adjacent types
      const adjacentTypes = [];
      if(midCount > 0){
        for(const k of ["A","B","C","D"]){
          if(confidenceLevel[k] === "mid"){
            const altCode = codeArr.map((c, i) => {
              if(["A","B","C","D"][i] === k){
                return c === axes[k].leftCode ? axes[k].rightCode : axes[k].leftCode;
              }
              return c;
            }).join("");
            if(CHARACTERS[altCode]){
              adjacentTypes.push({ code:altCode, name:CHARACTERS[altCode].name });
            }
          }
        }
      }

      // Decisiveness
      const totalDecisiveness = ["A","B","C","D"].reduce((s,k) => s + Math.abs(norm[k] - 0.5), 0) / 2;
      const overallConfidence = totalDecisiveness > 0.6 ? "strong" : totalDecisiveness > 0.4 ? "moderate" : "mid";
      const overallLabel = overallConfidence === "strong" ? "경향이 확실히 나타나고 있습니다" : 
                          overallConfidence === "moderate" ? "약간 경향이 나타나고 있습니다" : "장면에 따라 변하기 쉬운 타입입니다";

      // Straight line check
      const allAns = Object.values(state.answers);
      const straightLine = allAns.length >= 10 && new Set(allAns).size <= 2;

      return {
        means, hard, code: actualCode, norm, pos, leftPct,
        coherenceByAxis, breakdown,
        totalDecisiveness, confidenceLevel, confidenceLabel, midCount, adjacentTypes,
        overallConfidence, overallLabel, straightLine,
        char: CHARACTERS[actualCode], axes
      };
    }

    const COHERENCE_COMMENTS = {

      low: "이 축은 장면에 따라 꽤 변하는 것 같네요. 상대나 상황을 보고 판단하는 적응력의 표현입니다."

    function generatePersonalizedInsights(res) {
      const insights = {
        strongHits: [],      // 強く響くピンポイント
        axisDetails: {},     // 軸ごとの상세
        combinations: [],    // 組み合わせインサイト
        coherenceNotes: {},  // 一貫性コメント
        behaviorChecks: []   // 行動チェックリスト
      };

      // 1. 強い回答を抽出してピンポイントインサイト生成
      for(const k of ["A","B","C","D"]){
        const bd = res.breakdown[k];
        bd.forEach(item => {
          const qInsight = QUESTION_INSIGHTS[item.id];
          if(!qInsight) return;
          
          // 強い回答（左쪽 or 右쪽）を判定
          const isStrongLeft = item.contrib < -0.3; // 左쪽（そう思う側）
          const isStrongRight = item.contrib > 0.3; // 右쪽（そう思わない側）
          
          if(isStrongLeft && qInsight.left){
            insights.strongHits.push({
              text: qInsight.left,
              strength: Math.abs(item.contrib),
              axis: k
            });
          } else if(isStrongRight && qInsight.right){
            insights.strongHits.push({
              text: qInsight.right,
              strength: Math.abs(item.contrib),
              axis: k
            });
          }
        });

        // 一貫性コメント
        const coh = res.coherenceByAxis[k];
        if(coh > 0.7){
          insights.coherenceNotes[k] = COHERENCE_COMMENTS.high;
        } else if(coh > 0.4){
          insights.coherenceNotes[k] = COHERENCE_COMMENTS.mid;
        } else {
          insights.coherenceNotes[k] = COHERENCE_COMMENTS.low;
        }
      }

      // 強い順にソートして上位を取得
      insights.strongHits.sort((a,b) => b.strength - a.strength);
      insights.strongHits = insights.strongHits.slice(0, 6);

      // 2. 軸の組み合わせインサイト
      const combos = [
        { keys: ["A", "D"], id: `A_${res.hard.A}_D_${res.hard.D}` },
        { keys: ["B", "C"], id: `B_${res.hard.B}_C_${res.hard.C}` },
        { keys: ["C", "D"], id: `C_${res.hard.C}_D_${res.hard.D}` }
      ];
      
      combos.forEach(c => {
        // 両軸ともmid（장면에 따라）の場合は組み合わせコメントをスキップ
        const bothMid = c.keys.every(k => res.confidenceLevel[k] === "mid");
        if(!bothMid && COMBINATION_INSIGHTS[c.id]){
          insights.combinations.push(COMBINATION_INSIGHTS[c.id]);
        }
      });

      // 3. 行動チェックリスト（タイプに応じて生成）
      insights.behaviorChecks = generateBehaviorChecks(res);

      return insights;
    }

    function generateBehaviorChecks(res) {
      const checks = [];
      
      // A軸
      if(res.hard.A === "L" && res.confidenceLevel.A !== "mid"){
        checks.push("학부모회에서 「저 사람 항상 있지」라고 생각되고 있다");
        checks.push("학교 정보는 대략 파악하고 있다는 자신감이 있다");

        checks.push("将来の選択肢が広がるような習い事・経験を意識している");

        checks.push("子どもの友達関係が気になることが多い");

      // D軸

        checks.push("「こうしてみたら？」とアドバイスしがち");

        checks.push("困っていても、まずは本人に任せて見守る");

      return checks;
    }

    function generateAxisDetailComment(res, axis) {
      const level = res.confidenceLevel[axis];
      const side = res.hard[axis];
      const ax = res.axes[axis];
      const leftPct = res.leftPct[axis];
      const rightPct = 100 - leftPct;
      
      const sideLabel = side === "L" ? ax.left.split("・")[0] : ax.right.split("・")[0];
      const oppLabel = side === "L" ? ax.right.split("・")[0] : ax.left.split("・")[0];
      
      if(level === "strong"){
        return `「${sideLabel}」の경향이 확실히 나타나고 있습니다。これはあなたの軸として確立されていて、迷いが少ないはずです。`;
      } else if(level === "moderate"){
        return `약간「${sideLabel}」쪽ですが、状況によっては「${oppLabel}」の面も出ることがありそうです。`;
      } else {
        return `この軸は場面によって変わりやすいようです。「${sideLabel}」と「${oppLabel}」の両方を持っていて、状況に応じて使い分けているのかもしれません。`;
      }
    }

    function render(){
      window.scrollTo(0,0);

      const prevStep = state.step;
      if(state.step === "result" && !isRegistered()){
        if(isQuizCompleted()){
          state.step = "gate";
        } else {
          state.step = Object.keys(state.answers).length ? "quiz" : "intro";
        }
      } else if(state.step === "gate" && isRegistered()){
        state.step = "result";
      } else if(state.step === "gate" && !isQuizCompleted()){
        state.step = Object.keys(state.answers).length ? "quiz" : "intro";
      }
      if(prevStep !== state.step) saveState();

      updateNavActive();
      if(state.step === "intro") renderIntro();
      else if(state.step === "quiz") renderQuiz();
      else if(state.step === "gate") renderGate();
      else if(state.step === "characters") renderCharacters();
      else renderResult();

    function renderQuiz(){

      const start = state.page * PAGE_SIZE;
      const currentQs = shuffledQs.slice(start, start + PAGE_SIZE);
      const totalPage = Math.ceil(shuffledQs.length / PAGE_SIZE);
      const progress = Math.round((Object.keys(state.answers).length / shuffledQs.length) * 100);

      const qHtml = currentQs.map((q, i) => {
        const val = state.answers[q.id];
        return `

      }).join("");

      app.innerHTML = `

          <div style="display:flex; justify-content:space-between; margin-top:30px;">
            <button id="btnPrev" ${state.page===0 ? "disabled":""}>이전</button>

              ${state.page === totalPage - 1 ? "결과 보기" : "다음"}
            </button>
          </div>
        </div>
      `;

      currentQs.forEach(q => {
        document.querySelectorAll(`button.likert-btn[data-qid="${q.id}"]`).forEach(btn => {
          btn.onclick = () => {
            const val = parseInt(btn.dataset.val);
            state.answers[q.id] = val;
            document.querySelectorAll(`button.likert-btn[data-qid="${q.id}"]`).forEach(b => b.classList.remove("selected"));

            document.querySelector(".progress-fill").style.width = p + "%";

        });

      document.getElementById("btnPrev").onclick = () => { state.page--; render(); };
      document.getElementById("btnNext").onclick = () => {
        const missing = currentQs.find(q => !state.answers[q.id]);
        if(missing){ alert("아직 답변하지 않은 항목이 있습니다"); return; }
        if(state.page < totalPage - 1){
          state.page++;
          render();
        } else {
          state.step = isRegistered() ? "result" : "gate";
          render();
        }
      };
    }

    async function submitLead(payload){

          body: JSON.stringify(payload)
        });
        console.log("[Frontend] Response status:", r.status, r.statusText);
        const data = await r.json().catch(()=> ({}));
        if(!r.ok) {
          console.error("[Frontend] Request failed:", {
            status: r.status,
            statusText: r.statusText,
            data: data
          });
          throw new Error(data?.error || "전송에 실패했습니다");
        }
        console.log("[Frontend] Lead submitted successfully");
        return data;
      } catch (error) {
        console.error("[Frontend] Error in submitLead:", error);

    function buildStripeSheetPayload(res, extraPayload = {}){
      const questionAnswers = {};
      QUESTIONS.forEach(q => {
        if (state.answers[q.id]) {
          questionAnswers[q.id] = state.answers[q.id];
        }
      });

      let storageRaw = "";
      try {
        storageRaw = localStorage.getItem(STORAGE_KEY) || "";
      } catch (_) {}

      let stateSnapshot = null;
      try {
        stateSnapshot = JSON.parse(JSON.stringify(state));
      } catch (_) {
        stateSnapshot = state;
      }

      return {
        event: "stripe_click",
        source: "16mama",
        createdAt: new Date().toISOString(),
        pageUrl: window.location.href,
        userAgent: navigator.userAgent,
        name: state.profile?.name || "",
        age: state.profile?.age || "",
        email: state.profile?.email || "",
        gender: state.gender || "",
        type: res?.code || "",
        diagnosisName: res?.char?.name || "",
        axes: res?.leftPct || {},
        answers: questionAnswers,
        interested: state.interested === true,
        userId: state.userId || "",
        referrerId: state.referrerId || "",
        shareCount: state.shareCount || 0,
        storageKey: STORAGE_KEY,
        storageRaw,
        stateSnapshot,
        ...extraPayload
      };
    }

    function sendToGoogleSheet(payload){
      if (!GAS_WEBAPP_URL) {
        console.warn("[Stripe] GAS_WEBAPP_URL is empty. Skipping sheet send.");
        return;
      }
      try {
        const body = JSON.stringify(payload);
        if (navigator.sendBeacon) {
          const blob = new Blob([body], { type: "text/plain" });
          navigator.sendBeacon(GAS_WEBAPP_URL, blob);
          return;
        }
        fetch(GAS_WEBAPP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body,
          keepalive: true
        }).catch(() => {});
      } catch (e) {
        console.warn("[Stripe] Sheet send failed:", e);
      }
    }

        if (!root || !viewport || !track || !dotsWrap) return;
        if (root.dataset.initialized === "true") return;

        const images = Array.from(new Set(PLUSH_RESERVATION_IMAGES));
        if (images.length === 0) return;

        const slides = [];
        const dots = [];

        images.forEach((src, index) => {
          const slide = document.createElement("div");
          slide.className = "plush-gallery-slide";

          const img = document.createElement("img");
          img.src = src;
          img.alt = `인형키홀더 ${index + 1}`;
          img.loading = index === 0 ? "eager" : "lazy";
          img.decoding = "async";
          img.onerror = function () { this.style.display = "none"; };

          slide.appendChild(img);
          track.appendChild(slide);
          slides.push(slide);

          const dot = document.createElement("button");
          dot.type = "button";
          dot.className = "plush-gallery-dot";
          dot.setAttribute("aria-label", `${index + 1}枚目を表示`);
          dot.addEventListener("click", () => {
            goTo(index, true);
          });
          dotsWrap.appendChild(dot);
          dots.push(dot);
        });

        let currentIndex = 0;
        let dragging = false;
        let startX = 0;
        let currentX = 0;
        let startTranslateX = 0;
        let pointerId = null;
        const maxIndex = slides.length - 1;
        const swipeThreshold = 30;

        function slideWidth() {
          return viewport.getBoundingClientRect().width || 1;
        }

        function hideHint() {
          if (!hint) return;
          hint.classList.add("is-hidden");
        }

        function updateNav() {
          dots.forEach((dot, index) => {
            dot.classList.toggle("is-active", index === currentIndex);
          });
          if (prevBtn) prevBtn.disabled = currentIndex === 0;
          if (nextBtn) nextBtn.disabled = currentIndex === maxIndex;
        }

        function render(animated = true) {
          const width = slideWidth();
          const x = -currentIndex * width;
          track.style.transition = animated ? "transform 0.36s ease" : "none";
          track.style.transform = `translateX(${x}px)`;
          updateNav();
        }

        function goTo(nextIndex, fromUser = false, animated = true) {
          currentIndex = Math.max(0, Math.min(maxIndex, nextIndex));
          render(animated);
          if (fromUser) hideHint();
        }

        function endDrag(e) {
          if (!dragging) return;
          if (pointerId !== null && e?.pointerId !== undefined && e.pointerId !== pointerId) return;

          dragging = false;
          pointerId = null;
          viewport.classList.remove("is-dragging");

          const deltaX = currentX - startX;
          if (deltaX <= -swipeThreshold && currentIndex < maxIndex) currentIndex += 1;
          if (deltaX >= swipeThreshold && currentIndex > 0) currentIndex -= 1;
          if (Math.abs(deltaX) > 6) hideHint();

          render(true);

          if (viewport.releasePointerCapture && e?.pointerId !== undefined) {
            try { viewport.releasePointerCapture(e.pointerId); } catch (_) {}
          }
        }

        viewport.addEventListener("pointerdown", (e) => {
          if (dragging || slides.length <= 1) return;

          dragging = true;
          pointerId = e.pointerId;
          startX = e.clientX;
          currentX = e.clientX;
          startTranslateX = -currentIndex * slideWidth();
          track.style.transition = "none";
          viewport.classList.add("is-dragging");

          if (viewport.setPointerCapture) {
            try { viewport.setPointerCapture(e.pointerId); } catch (_) {}
          }

          e.preventDefault();
        });

        viewport.addEventListener("pointermove", (e) => {
          if (!dragging) return;
          if (pointerId !== null && e.pointerId !== pointerId) return;

          currentX = e.clientX;
          const dx = currentX - startX;
          const width = slideWidth();
          const minTranslate = -maxIndex * width;
          let targetX = startTranslateX + dx;

          if (targetX > 0) {
            targetX *= 0.35;
          } else if (targetX < minTranslate) {
            targetX = minTranslate + (targetX - minTranslate) * 0.35;
          }

          track.style.transform = `translateX(${targetX}px)`;
          e.preventDefault();
        });

        viewport.addEventListener("pointerup", endDrag);
        viewport.addEventListener("pointercancel", endDrag);
        viewport.addEventListener("lostpointercapture", () => endDrag());

        if (prevBtn) {
          prevBtn.addEventListener("click", () => {
            goTo(currentIndex - 1, true);
          });
        }
        if (nextBtn) {
          nextBtn.addEventListener("click", () => {
            goTo(currentIndex + 1, true);
          });
        }

        viewport.addEventListener("keydown", (e) => {
          if (e.key === "ArrowRight") {
            goTo(currentIndex + 1, true);
            e.preventDefault();
            return;
          }
          if (e.key === "ArrowLeft") {
            goTo(currentIndex - 1, true);
            e.preventDefault();
          }
        });

        const sync = () => {
          if (viewport.offsetParent === null) return;
          render(false);
        };

        window.addEventListener("resize", sync, { passive: true });
        syncPlushReservationGallery = sync;

        root.dataset.initialized = "true";
        goTo(0, false, false);
      }

      function activateResultProductTab(tabKey) {
        if (!tabKey) return;

        resultProductTabButtons.forEach((button) => {
          const isActive = button.dataset.resultProductTab === tabKey;
          button.setAttribute("aria-selected", isActive ? "true" : "false");
          button.tabIndex = isActive ? 0 : -1;
        });

        resultProductPanels.forEach((panel) => {
          const isActive = panel.dataset.resultProductPanel === tabKey;
          panel.classList.toggle("is-active", isActive);
          panel.hidden = !isActive;
        });

        if (tabKey === "plush") {
          requestAnimationFrame(() => {
            syncPlushReservationGallery();
          });
        }
      }

      resultProductTabButtons.forEach((button, index) => {
        button.addEventListener("click", () => {
          activateResultProductTab(button.dataset.resultProductTab || "");
        });

        button.addEventListener("keydown", (e) => {
          if (!["ArrowRight", "ArrowLeft", "Home", "End"].includes(e.key)) return;
          e.preventDefault();

          let nextIndex = index;
          if (e.key === "ArrowRight") nextIndex = (index + 1) % resultProductTabButtons.length;
          if (e.key === "ArrowLeft") nextIndex = (index - 1 + resultProductTabButtons.length) % resultProductTabButtons.length;
          if (e.key === "Home") nextIndex = 0;
          if (e.key === "End") nextIndex = resultProductTabButtons.length - 1;

          const nextButton = resultProductTabButtons[nextIndex];
          if (!nextButton) return;

          activateResultProductTab(nextButton.dataset.resultProductTab || "");
          nextButton.focus();
        });
      });

      initPlushReservationGallery();

      if (resultProductTabButtons.length > 0) {
        const defaultTab = resultProductTabButtons.find((button) => button.dataset.resultProductTab === "plush")?.dataset.resultProductTab
          || resultProductTabButtons[0]?.dataset.resultProductTab
          || "";
        activateResultProductTab(defaultTab);
      }

      // 抽選予約ボタンのイベントリスナー
      const reservationBtn = document.getElementById("btnReservation");
      if(reservationBtn){
        reservationBtn.onclick = () => {
          window.location.href = "../../index.html?openPricePopup=true#price";
        };
      }

      const stripeButtons = Array.from(document.querySelectorAll("[data-stripe-product-type]"));
      stripeButtons.forEach((stripeBtn) => {
        stripeBtn.addEventListener("click", () => {
          const payload = buildStripeSheetPayload(res, {
            clickedProductType: stripeBtn.dataset.stripeProductType || "",
            clickedProductLabel: stripeBtn.dataset.stripeProductLabel || "",
            clickedButtonId: stripeBtn.id || ""
          });
          sendToGoogleSheet(payload);
        });
      });

      // あなたの回答から見えたことの折りたたみ
      const insightToggleBtn = document.getElementById("insightToggleBtn");
      if(insightToggleBtn){
        insightToggleBtn.onclick = () => {
          const content = document.getElementById("insightContent");
          const icon = document.getElementById("insightToggleIcon");
          if(content.style.display === "none"){
            content.style.display = "block";
            icon.style.transform = "rotate(180deg)";
          } else {
            content.style.display = "none";
            icon.style.transform = "rotate(0deg)";
          }
        };
      }

      // 恋愛価値観の折りたたみ
      document.getElementById("loveToggleBtn").onclick = () => {
        const content = document.getElementById("loveContent");
        const icon = document.getElementById("loveToggleIcon");
        if(content.style.display === "none"){
          content.style.display = "block";
          icon.style.transform = "rotate(180deg)";
        } else {
          content.style.display = "none";
          icon.style.transform = "rotate(0deg)";
        }
      };

      // 当てはまりチェックのインタラクション
      const checkItems = document.querySelectorAll('.check-item input[type="checkbox"]');
      const checkResult = document.getElementById('checkResult');
      if(checkItems.length > 0 && checkResult){
        checkItems.forEach(item => {
          item.addEventListener('change', () => {
            const total = checkItems.length;
            const checked = Array.from(checkItems).filter(c => c.checked).length;
            
            if(checked > 0){
              checkResult.style.display = 'block';
              if(checked === total){
                checkResult.innerHTML = `🎯 全問正解！かなり当たっていますね！`;
              } else if(checked >= total * 0.7){
                checkResult.innerHTML = `✨ ${checked}/${total}個当てはまり！なかなかの的中率です！`;
              } else if(checked >= total * 0.5){
                checkResult.innerHTML = `👍 ${checked}/${total}個当てはまり！半分以上ですね！`;
              } else {
                checkResult.innerHTML = `📝 ${checked}/${total}個当てはまり`;
              }
            } else {
              checkResult.style.display = 'none';
            }
          });
        });
      }
    }

    const ENABLE_MYPAGE_ENTRY = false; // Set true to show the launcher again.

    function mountMyPageLauncher() {
      if (!ENABLE_MYPAGE_ENTRY) return;
      if (document.getElementById("mobbyMyPageLauncher")) return;
      const launcher = document.createElement("a");
      launcher.id = "mobbyMyPageLauncher";
      launcher.href = "/mypage-register.html";
      launcher.textContent = "진단 모아보기 페이지";
      launcher.style.position = "fixed";
      launcher.style.right = "12px";
      launcher.style.bottom = "12px";
      launcher.style.zIndex = "95";
      launcher.style.padding = "10px 14px";
      launcher.style.borderRadius = "999px";
      launcher.style.fontSize = "12px";
      launcher.style.fontWeight = "700";
      launcher.style.letterSpacing = "0.04em";
      launcher.style.textDecoration = "none";
      launcher.style.color = "#fff";
      launcher.style.background = "linear-gradient(135deg,#0ea5e9,#0284c7)";
      launcher.style.boxShadow = "0 12px 24px rgba(14,165,233,0.34)";
      document.body.appendChild(launcher);
    }

    // Initialize
    render();
    mountMyPageLauncher();
  </script>
<script>
(function mobbyDiagnosisMenuInit() {
  const titleHome = document.getElementById("titleHome");
  const titleMenu = document.getElementById("titleMenu");
  if (!titleHome || !titleMenu) return;
  titleHome.style.cursor = "pointer";
  titleHome.onclick = function (e) {
    e.preventDefault();
    e.stopPropagation();
    titleMenu.style.display = titleMenu.style.display === "block" ? "none" : "block";
  };
  titleMenu.addEventListener("click", function (e) {
    e.stopPropagation();
  });
  document.addEventListener("click", function () {
    titleMenu.style.display = "none";
  });
})();
</script>
